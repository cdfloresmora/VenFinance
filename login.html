<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VenFinance">
<meta name="theme-color" content="#080810">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<title>VenFinance — Iniciar Sesión</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
  /* ═══════════════════════════════════════
     LOGIN PAGE — Styles
  ═══════════════════════════════════════ */

  .login-wrapper {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    z-index: 1;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 36px 28px 32px;
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(212,168,67,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .login-logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold) 0%, #8B6914 100%);
    border-radius: var(--r-md);
    display: grid;
    place-items: center;
    font-size: 28px;
    box-shadow: 0 0 32px var(--gold-glow);
  }

  .login-logo-text {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .login-subtitle {
    font-size: 13px;
    color: var(--text-2);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.5;
    position: relative;
    z-index: 1;
  }

  /* ── Google Button ── */
  .btn-google {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--border-bright);
    background: var(--bg-elevated);
    color: var(--text-1);
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all .2s;
    position: relative;
    z-index: 1;
  }

  .btn-google:hover { background: var(--bg-glass-h); border-color: rgba(255,255,255,0.2); }
  .btn-google:active { transform: scale(0.98); }

  .btn-google svg {
    width: 18px; height: 18px;
    flex-shrink: 0;
  }

  /* ── Divider ── */
  .login-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 22px 0;
    position: relative;
    z-index: 1;
  }

  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .login-divider span {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  /* ── Form ── */
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .form-group input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-1);
    font-family: var(--font-ui);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }

  .form-group input::placeholder {
    color: var(--text-3);
  }

  .form-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }

  .form-group.hidden { display: none; }

  .btn-login {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--gold);
    color: #0a0a0f;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    margin-top: 4px;
  }

  .btn-login:hover { background: var(--gold-light); }
  .btn-login:active { transform: scale(0.98); background: #b8952e; }
  .btn-login:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .login-toggle {
    text-align: center;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }

  .login-toggle span {
    font-size: 13px;
    color: var(--text-2);
  }

  .login-toggle a {
    color: var(--gold);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    font-size: 13px;
    transition: color .2s;
  }

  .login-toggle a:hover { color: var(--gold-light); }

  /* ── Error/Success messages ── */
  .login-msg {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    display: none;
    position: relative;
    z-index: 1;
  }

  .login-msg.error {
    display: block;
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(224,82,82,0.3);
  }

  .login-msg.success {
    display: block;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(62,207,142,0.3);
  }

  /* ── Loading spinner ── */
  .login-loading {
    display: none;
    text-align: center;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .login-loading.show { display: block; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  .login-loading span {
    font-size: 12px;
    color: var(--text-2);
    font-family: var(--font-mono);
  }

  /* ── Footer ── */
  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-3);
    font-family: var(--font-mono);
    position: relative;
    z-index: 1;
  }

  @media (min-width: 640px) {
    .login-card {
      padding: 44px 36px 40px;
      max-width: 420px;
    }
    .login-logo-icon {
      width: 64px; height: 64px;
      font-size: 32px;
    }
    .login-logo-text {
      font-size: 28px;
    }
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">&#8383;</div>
      <span class="login-logo-text">VenFinance</span>
    </div>

    <div class="login-subtitle" id="loginSubtitle">
      Controla tus finanzas con tasas de cambio en tiempo real
    </div>

    <!-- Message area -->
    <div class="login-msg" id="loginMsg"></div>

    <!-- Loading state -->
    <div class="login-loading" id="loginLoading">
      <div class="spinner"></div>
      <span>Verificando sesión...</span>
    </div>

    <!-- Auth content (hidden while checking session) -->
    <div id="authContent" style="display:none;">

      <!-- Google Login -->
      <button class="btn-google" id="btnGoogle" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>

      <div class="login-divider"><span>o</span></div>

      <!-- Local Auth Form -->
      <form class="login-form" id="loginForm" onsubmit="handleLocalAuth(event)">
        <div class="form-group hidden" id="nameGroup">
          <label for="inputName">Nombre</label>
          <input type="text" id="inputName" placeholder="Tu nombre" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="inputEmail">Correo electrónico</label>
          <input type="email" id="inputEmail" placeholder="tu@correo.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="inputPassword">Contraseña</label>
          <input type="password" id="inputPassword" placeholder="Tu contraseña" autocomplete="current-password" required minlength="6">
        </div>

        <div class="form-group hidden" id="confirmGroup">
          <label for="inputConfirm">Confirmar contraseña</label>
          <input type="password" id="inputConfirm" placeholder="Repite tu contraseña" autocomplete="new-password">
        </div>

        <button type="submit" class="btn-login" id="btnSubmit">Iniciar Sesión</button>
      </form>

      <div class="login-toggle" id="loginToggle">
        <span>¿No tienes cuenta? </span>
        <a onclick="toggleMode()">Crear cuenta</a>
      </div>

    </div><!-- /authContent -->

    <div class="login-footer">
      Tus datos se almacenan de forma segura en tu dispositivo
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script src="auth.js"></script>
<script>
/* ════════════════════════════════════════════════════════════════
   LOGIN PAGE — Logic
   ════════════════════════════════════════════════════════════════ */

let isRegisterMode = false;

// ── Toggle login / register ──────────────────────────────────
function toggleMode() {
  isRegisterMode = !isRegisterMode;

  document.getElementById('nameGroup').classList.toggle('hidden', !isRegisterMode);
  document.getElementById('confirmGroup').classList.toggle('hidden', !isRegisterMode);
  document.getElementById('btnSubmit').textContent = isRegisterMode ? 'Crear Cuenta' : 'Iniciar Sesión';
  document.getElementById('loginSubtitle').textContent = isRegisterMode
    ? 'Crea tu cuenta para comenzar a controlar tus finanzas'
    : 'Controla tus finanzas con tasas de cambio en tiempo real';

  const toggle = document.getElementById('loginToggle');
  toggle.innerHTML = isRegisterMode
    ? '<span>¿Ya tienes cuenta? </span><a onclick="toggleMode()">Iniciar sesión</a>'
    : '<span>¿No tienes cuenta? </span><a onclick="toggleMode()">Crear cuenta</a>';

  clearMsg();
}

// ── Google Login ─────────────────────────────────────────────
function loginWithGoogle() {
  VF.Auth.login();
}

// ── Local Auth Handler ───────────────────────────────────────
async function handleLocalAuth(e) {
  e.preventDefault();
  clearMsg();

  const email    = document.getElementById('inputEmail').value.trim().toLowerCase();
  const password = document.getElementById('inputPassword').value;

  if (!email || !password) {
    showMsg('Completa todos los campos', 'error');
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;

  try {
    if (isRegisterMode) {
      const name    = document.getElementById('inputName').value.trim();
      const confirm = document.getElementById('inputConfirm').value;

      if (!name) {
        showMsg('Ingresa tu nombre', 'error');
        btn.disabled = false;
        return;
      }

      if (password.length < 6) {
        showMsg('La contraseña debe tener al menos 6 caracteres', 'error');
        btn.disabled = false;
        return;
      }

      if (password !== confirm) {
        showMsg('Las contraseñas no coinciden', 'error');
        btn.disabled = false;
        return;
      }

      // Check if user already exists
      const existing = await VF.DB.get('users', email);
      if (existing) {
        showMsg('Ya existe una cuenta con este correo', 'error');
        btn.disabled = false;
        return;
      }

      // Hash password with PBKDF2
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const hash = await hashPassword(password, salt);

      // Save user
      await VF.DB.put('users', {
        email,
        name,
        passwordHash: arrayToBase64(hash),
        salt: arrayToBase64(salt),
        createdAt: Date.now(),
        authType: 'local'
      });

      // Set session and redirect
      setSession({ email, name, authType: 'local' });
      showMsg('Cuenta creada. Redirigiendo...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);

    } else {
      // Login mode
      const user = await VF.DB.get('users', email);
      if (!user) {
        showMsg('No existe una cuenta con este correo', 'error');
        btn.disabled = false;
        return;
      }

      // Verify password
      const salt = base64ToArray(user.salt);
      const hash = await hashPassword(password, salt);
      const hashB64 = arrayToBase64(hash);

      if (hashB64 !== user.passwordHash) {
        showMsg('Contraseña incorrecta', 'error');
        btn.disabled = false;
        return;
      }

      // Set session and redirect
      setSession({ email: user.email, name: user.name, authType: 'local' });
      showMsg('Bienvenido de vuelta. Redirigiendo...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    }
  } catch (err) {
    console.error('Auth error:', err);
    showMsg('Error inesperado. Intenta de nuevo.', 'error');
    btn.disabled = false;
  }
}

// ── Password Hashing (PBKDF2) ───────────────────────────────
async function hashPassword(password, salt) {
  const encoder = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', encoder.encode(password), 'PBKDF2', false, ['deriveBits']
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    256
  );
  return new Uint8Array(bits);
}

function arrayToBase64(arr) {
  return btoa(String.fromCharCode(...new Uint8Array(arr)));
}

function base64ToArray(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// ── Session Management ───────────────────────────────────────
function setSession(userData) {
  const session = {
    email: userData.email,
    name: userData.name,
    authType: userData.authType,
    loginAt: Date.now()
  };
  sessionStorage.setItem('vf_session', JSON.stringify(session));
  localStorage.setItem('vf_current_user', userData.email);
}

// ── Messages ─────────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById('loginMsg');
  el.textContent = text;
  el.className = `login-msg ${type}`;
}

function clearMsg() {
  const el = document.getElementById('loginMsg');
  el.className = 'login-msg';
  el.textContent = '';
}

// ── Check existing session on load ───────────────────────────
async function checkExistingSession() {
  const loading = document.getElementById('loginLoading');
  const content = document.getElementById('authContent');
  loading.classList.add('show');

  try {
    // Check for OAuth callback (code in URL)
    const handled = await VF.Auth.handleCallback();
    if (handled) {
      // Google OAuth successful — get user info and set session
      const token = await VF.Auth.getValidToken();
      if (token) {
        const userInfo = await fetchGoogleUserInfo(token);
        setSession({
          email: userInfo.email,
          name: userInfo.name || userInfo.email.split('@')[0],
          authType: 'google'
        });
        window.location.href = 'dashboard.html';
        return;
      }
    }

    // Check for existing valid session
    const session = sessionStorage.getItem('vf_session');
    if (session) {
      const s = JSON.parse(session);
      if (s.authType === 'google') {
        const token = await VF.Auth.getValidToken();
        if (token) {
          window.location.href = 'dashboard.html';
          return;
        }
      } else if (s.authType === 'local') {
        window.location.href = 'dashboard.html';
        return;
      }
    }

    // Check for Google tokens without session (returning user)
    const token = await VF.Auth.getValidToken();
    if (token) {
      const userInfo = await fetchGoogleUserInfo(token);
      setSession({
        email: userInfo.email,
        name: userInfo.name || userInfo.email.split('@')[0],
        authType: 'google'
      });
      window.location.href = 'dashboard.html';
      return;
    }
  } catch (err) {
    console.warn('Session check error:', err);
  }

  // No valid session — show login form
  loading.classList.remove('show');
  content.style.display = 'block';
}

async function fetchGoogleUserInfo(token) {
  const resp = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!resp.ok) throw new Error('Failed to fetch user info');
  return resp.json();
}

// ── Service Worker ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ─────────────────────────────────────────────────────
checkExistingSession();
</script>
</body>
</html>
